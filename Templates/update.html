{% extends "base.html" %}

{% block title %}Update Task{% endblock title %}

{% block body %}
<style>
  .update-card {
    max-width: 540px;
    margin: 3rem auto 0;
    background-color: var(--surface-2, #161616);
    border: 1px solid var(--border-subtle, #2a2a2a);
    border-radius: 16px;
    overflow: hidden;
  }

  .update-card-header {
    padding: 1.5rem 1.75rem;
    border-bottom: 1px solid var(--border-subtle, #2a2a2a);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .update-card-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: rgba(255, 193, 7, 0.12);
    color: #ffc107;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; flex-shrink: 0;
  }

  .update-card-header h2 {
    font-size: 1.15rem; font-weight: 700; margin: 0; color: #fff;
  }

  .update-card-header p {
    font-size: 0.82rem; color: #6b6b6b; margin: 0;
  }

  .update-card-body { padding: 1.75rem; }

  .field-group { margin-bottom: 1.25rem; }

  .field-group label {
    display: block;
    font-size: 0.78rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: #6b6b6b; margin-bottom: 0.4rem;
  }

  .field-group input,
  .field-group textarea {
    width: 100%;
    background-color: #1f1f1f;
    border: 1px solid #2a2a2a;
    border-radius: 10px; color: #fff;
    padding: 0.65rem 0.9rem;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
    font-family: inherit;
  }

  .field-group input:focus,
  .field-group textarea:focus {
    border-color: #ffc107;
  }

  .field-group textarea { resize: vertical; min-height: 100px; }

  .update-card-footer {
    padding: 1.25rem 1.75rem;
    border-top: 1px solid #2a2a2a;
    display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 0.75rem;
  }

  .btn-save {
    background-color: #ffc107; border: none; color: #000;
    font-weight: 700; border-radius: 50px;
    padding: 0.55rem 1.5rem; cursor: pointer;
    display: inline-flex; align-items: center; gap: 0.4rem;
    transition: background-color 0.15s; font-size: 0.9rem;
  }

  .btn-save:hover { background-color: #e0a800; }

  .btn-cancel {
    font-size: 0.88rem; color: #6b6b6b; text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.35rem;
    transition: color 0.15s;
  }

  .btn-cancel:hover { color: #fff; }
</style>

<div class="update-card">
  <div class="update-card-header">
    <div class="update-card-icon"><i class="bi bi-pencil-fill"></i></div>
    <div>
      <h2>Update Task</h2>
      <p>Edit the title or description below</p>
    </div>
  </div>

  <form method="POST" action="{% url 'task-update' task.id %}">
    {% csrf_token %}
    <div class="update-card-body">

      {% if error %}
        <div class="alert alert-danger py-2 mb-3" role="alert">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}

      <div class="field-group">
        <label for="taskTitle">Title</label>
        <input type="text" name="title" id="taskTitle"
               value="{{ task.title }}" placeholder="Enter task title">
      </div>

      <div class="field-group">
        <label for="taskDescription">Description</label>
        <textarea name="description" id="taskDescription"
                  rows="3" placeholder="Enter description">{{ task.description }}</textarea>
      </div>

    </div>

    <div class="update-card-footer">
      <a href="{% url 'task-list' %}" class="btn-cancel">
        <i class="bi bi-arrow-left"></i> Cancel
      </a>
      <button type="submit" class="btn-save">
        <i class="bi bi-check-lg"></i> 
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock body %}
