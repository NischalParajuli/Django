<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <title>{% block title %}TodoList{% endblock title %}</title>
  <style>
    :root {
      --surface-1:     #0f0e17;   /* deep indigo-black — page bg     */
      --surface-2:     #1a1825;   /* slightly lighter — card bg       */
      --surface-3:     #231f32;   /* input / hover bg                 */
      --border-subtle: #2e2a3f;   /* subtle purple-tinted borders     */
      --accent:        #a78bfa;   /* soft lavender                    */
      --accent-dim:    #7c5fe6;   /* deeper lavender for hover        */
      --text-muted:    #6b6480;   /* muted purple-grey                */
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--surface-1);
      color: #d4d0e8;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5, h6, .navbar-brand {
      font-family: 'Syne', sans-serif;
    }

    /* ── Navbar ── */
    .navbar {
      background-color: var(--surface-2) !important;
      border-bottom: 1px solid var(--border-subtle) !important;
      padding: 0.85rem 0;
    }

    .navbar-brand {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent) !important;
    }

    .navbar-brand i { margin-right: 0.3rem; }

    .nav-link {
      font-weight: 500;
      color: #8882a4 !important;
      padding-inline: 0.85rem !important;
      transition: color 0.15s;
      font-size: 0.92rem;
    }

    .nav-link:hover { color: #fff !important; }

    .nav-link.active {
      color: #fff !important;
      border-bottom: 2px solid var(--accent);
    }

    /* ── Buttons — override Bootstrap primaries ── */
    .btn-primary {
      background-color: var(--accent);
      border-color: var(--accent);
      color: #0f0e17;
      font-weight: 700;
    }

    .btn-primary:hover {
      background-color: var(--accent-dim);
      border-color: var(--accent-dim);
      color: #fff;
    }

    /* ── Cards ── */
    .card {
      background-color: var(--surface-2);
      border-color: var(--border-subtle);
    }

    /* ── Tables ── */
    .table {
      --bs-table-bg: transparent;
      --bs-table-border-color: var(--border-subtle);
      color: #d4d0e8;
    }

    /* ── Alerts ── */
    .alert-danger {
      background-color: rgba(220, 53, 69, 0.1);
      border-color: rgba(220, 53, 69, 0.25);
      color: #f87171;
    }

    .alert-info {
      background-color: rgba(167, 139, 250, 0.08);
      border-color: rgba(167, 139, 250, 0.2);
      color: var(--accent);
    }

    /* ── Page wrapper ── */
    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-1); }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">
        <i class="bi bi-check2-square"></i>TodoList
      </a>
      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}">
              <i class="bi bi-house me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'aboutus' %}">
              <i class="bi bi-info-circle me-1"></i>About
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'task-list' %}">
              <i class="bi bi-list-task me-1"></i>My Tasks
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'task-create' %}">
              <i class="bi bi-plus-circle me-1"></i>New Task
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    {% block body %}{% endblock body %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmhPdBcZU0w7XFn0RA0PrjFWdOlN"
          crossorigin="anonymous"></script>
</body>
</html>
